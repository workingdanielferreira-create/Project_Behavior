<!DOCTYPE html><html><head><meta charset="utf-8"><title>Project Behavior — FX Creator v2 (Rigged)</title><style>
:root{--bg:#0d0f14;--panel:#161a22;--panel2:#1d2330;--txt:#d8dee9;--acc:#e33;--acc2:#4af;--bd:#2a3242}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font:13px/1.4 'Segoe UI',sans-serif;display:flex;height:100vh;overflow:hidden}

select,input[type=text],input[type=number]{background:#0a0c10;color:var(--txt);border:1px solid var(--bd);border-radius:4px;padding:4px 6px;width:100%;font-size:12px}
input[type=range]{width:100%;accent-color:var(--acc)}

#bar,#bot{display:flex;gap:8px;align-items:center;padding:8px 12px;background:var(--panel)}

#bar b{color:var(--acc);font-size:14px}
.layer{padding:8px 12px;border-bottom:1px solid var(--bd);cursor:pointer;display:flex;align-items:center;gap:6px}
.layer.sel{background:var(--panel2);border-left:3px solid var(--acc)}
.layer .t{flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}.layer small{color:#7a8599}
.layer button{padding:1px 6px;font-size:11px}

.val{min-width:36px;text-align:right;color:#c8d2e0;font-size:11px}

.wstep:hover{background:var(--panel2)}
.wstep.cur{background:var(--panel2);color:#e8eefc;border-color:var(--acc)}
.wstep.done::after{content:" ✓";color:#5c7}
#modebtn{margin-right:4px}
#lset{padding:8px 12px;display:flex;gap:6px}
#tl{height:46px;background:var(--panel2);border-top:1px solid var(--bd);position:relative;cursor:pointer}
#tl .kf{position:absolute;top:14px;width:12px;height:12px;background:var(--acc);transform:translateX(-6px) rotate(45deg);cursor:pointer;border:1px solid #fff3}

#tl .ph{position:absolute;top:0;bottom:0;width:2px;background:var(--acc2)}
#json{position:fixed;inset:8%;background:var(--panel);border:1px solid var(--bd);border-radius:8px;display:none;flex-direction:column;padding:14px;z-index:9}
#json textarea{flex:1;background:#0a0c10;color:#9fe;border:1px solid var(--bd);font:12px monospace;padding:8px;margin:10px 0;resize:none}
.cols{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.hint{color:#7a8599;font-size:11px;padding:4px 12px}
</style></head><body>

<script>
const $=id=>document.getElementById(id);const cv=$('cv'),ctx=cv.getContext('2d'),jsonEl=$('json');
let W,H;function rsz(){W=cv.width=cv.clientWidth;H=cv.height=cv.clientHeight}window.onresize=rsz;
const D=Math.PI/180,rnd=(a,b)=>a+Math.random()*(b-a),lerp=(a,b,t)=>a+(b-a)*t;
// ================= RIG =================
// pose keys: rx,ry root offset; sp spine; hd head; lua,lfa left upper/forearm; rua,rfa; lth,lsh legs; rth,rsh; wp weapon
const PK=['rx','ry','sp','sp2','hd','lsht','rsht','lpvt','rpvt','lua','lfa','rua','rfa','lth','lsh','rth','rsh','wp','luas','lfas','ruas','rfas','lths','lshs','rths','rshs'];
const Z={rx:0,ry:0,sp:0,sp2:0,hd:0,lsht:0,rsht:0,lpvt:0,rpvt:0,lua:15,lfa:5,rua:-15,rfa:-5,lth:8,lsh:5,rth:-8,rsh:-5,wp:-45,luas:1,lfas:1,ruas:1,rfas:1,lths:1,lshs:1,rths:1,rshs:1};
const P=o=>({...Z,...o});
const ACTIONS={swordsman:{
 idle:[{t:0,p:P({})},{t:.5,p:P({ry:2,sp:2})},{t:1,p:P({})}],
 slash:[{t:0,p:P({rua:-150,rfa:-40,wp:-50,sp:-10,rx:-10})},{t:.35,p:P({rua:-155,rfa:-45,wp:-55,sp:-12,rx:-14})},{t:.55,p:P({rua:35,rfa:25,wp:35,sp:14,rx:25,lth:25,rth:-30})},{t:1,p:P({})}],
 dash:[{t:0,p:P({rx:-150,sp:22,lth:-30,lsh:45,rth:35,rsh:10,lua:-40,rua:30})},{t:1,p:P({rx:150,sp:22,lth:35,lsh:10,rth:-30,rsh:45,lua:30,rua:-40})}],
 run:[{t:0,p:P({lth:-35,lsh:40,rth:30,rsh:8,lua:-30,rua:25,sp:6})},{t:.5,p:P({lth:30,lsh:8,rth:-35,rsh:40,lua:25,rua:-30,sp:6})},{t:1,p:P({lth:-35,lsh:40,rth:30,rsh:8,lua:-30,rua:25,sp:6})}]},
shooter:{
 idle:[{t:0,p:P({wp:0})},{t:.5,p:P({ry:2,wp:0})},{t:1,p:P({wp:0})}],
 fire:[{t:0,p:P({rua:-90,rfa:0,wp:0,sp:4})},{t:.12,p:P({rua:-100,rfa:-6,wp:-6,rx:-6,sp:0})},{t:.4,p:P({rua:-90,rfa:0,wp:0,sp:4})},{t:1,p:P({rua:-90,rfa:0,wp:0,sp:4})}],
 run:[{t:0,p:P({wp:0,lth:-35,lsh:40,rth:30,rsh:8,lua:-30,rua:-70,rfa:-20,sp:8})},{t:.5,p:P({wp:0,lth:30,lsh:8,rth:-35,rsh:40,lua:25,rua:-70,rfa:-20,sp:8})},{t:1,p:P({wp:0,lth:-35,lsh:40,rth:30,rsh:8,lua:-30,rua:-70,rfa:-20,sp:8})}],
 dash:[{t:0,p:P({wp:0,rx:-150,sp:22,lth:-30,lsh:45,rth:35,rsh:10})},{t:1,p:P({wp:0,rx:150,sp:22,lth:35,lsh:10,rth:-30,rsh:45})}]}};
let keyframes=[],selKF=-1,poseMode=false;
function poseAt(t){ // interpolate keyframes at t in 0..1
 if(!keyframes.length)return P({});
 const ks=keyframes;if(t<=ks[0].t)return{...ks[0].p};if(t>=ks[ks.length-1].t)return{...ks[ks.length-1].p};
 for(let i=0;i<ks.length-1;i++){if(t>=ks[i].t&&t<=ks[i+1].t){const f=(t-ks[i].t)/(ks[i+1].t-ks[i].t||1),o={};
  PK.forEach(k=>o[k]=lerp(ks[i].p[k],ks[i+1].p[k],f));return o}}return{...ks[0].p}}
const BONES0={ua:22,fa:20,th:26,sh:24,torso:36};
function boneLens(){return (appMode==='char'&&CH&&CH.bones)?CH.bones:BONES0}
function joints(pose){ // world joint positions
 const cx=W/2,cy=H/2+40,J={},hip=[cx+pose.rx,cy+pose.ry];J.hip=hip;
 const B=(o,a,l)=>[o[0]+Math.cos(a)*l,o[1]+Math.sin(a)*l];
 const BL=boneLens();
 const spW=(-90+pose.sp)*D;J.torso_mid=B(hip,spW,BL.torso/2);
 const spW2=spW+(pose.sp2||0)*D;J.chest=B(J.torso_mid,spW2,BL.torso/2);
 const hdW=spW2+pose.hd*D;J.head=B(J.chest,hdW,16);
 J.r_shoulder=B(J.chest,spW2+Math.PI/2+pose.rsht*D,11);J.l_shoulder=B(J.chest,spW2-Math.PI/2+pose.lsht*D,11);
 J.r_hip=B(hip,pose.rpvt*D,8);J.l_hip=B(hip,Math.PI+pose.lpvt*D,8);
 const armBase=spW2+Math.PI;
 const luaW=armBase+pose.lua*D;J.l_elbow=B(J.l_shoulder,luaW,BL.ua*(pose.luas||1));
 const lfaW=luaW+pose.lfa*D;J.l_hand=B(J.l_elbow,lfaW,BL.fa*(pose.lfas||1));
 const ruaW=armBase+pose.rua*D;J.r_elbow=B(J.r_shoulder,ruaW,BL.ua*(pose.ruas||1));
 const rfaW=ruaW+pose.rfa*D;J.r_hand=B(J.r_elbow,rfaW,BL.fa*(pose.rfas||1));
 const lthW=(90+pose.lth)*D;J.l_knee=B(J.l_hip,lthW,BL.th*(pose.lths||1));J.l_foot=B(J.l_knee,(lthW+pose.lsh*D),BL.sh*(pose.lshs||1));
 const rthW=(90+pose.rth)*D;J.r_knee=B(J.r_hip,rthW,BL.th*(pose.rths||1));J.r_foot=B(J.r_knee,(rthW+pose.rsh*D),BL.sh*(pose.rshs||1));
 const fig=$('fig').value,wW=rfaW+pose.wp*D;J._wW=wW;J._rfaW=rfaW;J._spW=spW;J._spW2=spW2;J._luaW=luaW;J._lfaW=lfaW;J._ruaW=ruaW;J._hdW=hdW;
 if(fig==='swordsman'){J.blade_mid=B(J.r_hand,wW,19);J.blade_tip=B(J.r_hand,wW,38)}
 else if(fig==='custom'&&CH){const pts=wpnWorld(J.r_hand,wW);J._wpts=pts;
  J.weapon_tip=pts.length?pts[pts.length-1]:B(J.r_hand,wW,30);J.weapon_mid=pts.length?wpnMid(pts,J.r_hand):B(J.r_hand,wW,15)}
 else{J.muzzle=B(J.r_hand,wW,16)}
 return J}
const ANCHORS=()=>['point','hip','torso_mid','chest','head','l_shoulder','r_shoulder','l_hand','r_hand','l_foot','r_foot',...($('fig').value==='swordsman'?['blade_mid','blade_tip']:$('fig').value==='custom'?['weapon_mid','weapon_tip']:['muzzle'])];
function drawFigure(J,fig){ctx.save();ctx.globalCompositeOperation='source-over';
 ctx.strokeStyle=(fig==='custom'&&CH)?CH.palette.body:'#8fa0b8';ctx.lineWidth=3.5;ctx.lineCap='round';
 const L=(a,b)=>{ctx.beginPath();ctx.moveTo(J[a][0],J[a][1]);ctx.lineTo(J[b][0],J[b][1]);ctx.stroke()};
 L('hip','torso_mid');L('torso_mid','chest');L('chest','l_shoulder');L('chest','r_shoulder');L('hip','l_hip');L('hip','r_hip');
 L('l_shoulder','l_elbow');L('l_elbow','l_hand');L('r_shoulder','r_elbow');L('r_elbow','r_hand');
 L('l_hip','l_knee');L('l_knee','l_foot');L('r_hip','r_knee');L('r_knee','r_foot');
 ctx.beginPath();ctx.arc(J.head[0],J.head[1]-4,10,0,6.28);ctx.stroke();
 if(fig==='swordsman'){ctx.strokeStyle='#d8dee9';ctx.lineWidth=2.5;L('r_hand','blade_tip')}
 else if(fig==='custom'&&CH){const pts=J._wpts||[];
  ctx.strokeStyle=CH.weapon.color;ctx.lineWidth=CH.weapon.thickness;
  if(pts.length){ctx.beginPath();ctx.moveTo(J.r_hand[0],J.r_hand[1]);pts.forEach(p=>ctx.lineTo(p[0],p[1]));ctx.stroke()}
  if(weaponEdit){pts.forEach((p,i)=>{ctx.fillStyle=i===dragWP?'#ff4040':'#ffd050';ctx.beginPath();ctx.arc(p[0],p[1],4/Math.max(cam.z,0.5)+2,0,6.28);ctx.fill()});
   ctx.fillStyle=CH.palette.accent;ctx.beginPath();ctx.arc(J.r_hand[0],J.r_hand[1],3,0,6.28);ctx.fill();
   [['weapon_mid','#7fd'],['weapon_tip','#7fd']].forEach(([a,c])=>{if(J[a]){ctx.strokeStyle=c;ctx.lineWidth=1;ctx.beginPath();ctx.arc(J[a][0],J[a][1],6,0,6.28);ctx.stroke()}})}}
 else{ctx.strokeStyle='#d8dee9';ctx.lineWidth=4;L('r_hand','muzzle')}
 if(poseMode){for(const k in J){if(k[0]==='_')continue;ctx.fillStyle=k===dragJ?'#ff4040':'#4af';
  ctx.beginPath();ctx.arc(J[k][0],J[k][1],4.5,0,6.28);ctx.fill()}}
 ctx.restore()}
// joint→bone mapping for drag posing: [origin joint, worldBase fn(pose,J), poseKey]
const DRAGMAP={torso_mid:['hip',(p,J)=>-90*D,'sp'],chest:['torso_mid',(p,J)=>J._spW,'sp2'],head:['chest',(p,J)=>J._spW2,'hd'],
 r_shoulder:['chest',(p,J)=>J._spW2+Math.PI/2,'rsht'],l_shoulder:['chest',(p,J)=>J._spW2-Math.PI/2,'lsht'],
 r_hip:['hip',()=>0,'rpvt'],l_hip:['hip',()=>Math.PI,'lpvt'],
 l_elbow:['l_shoulder',(p,J)=>J._spW2+Math.PI,'lua',['luas',()=>boneLens().ua]],l_hand:['l_elbow',(p,J)=>J._luaW,'lfa',['lfas',()=>boneLens().fa]],
 r_elbow:['r_shoulder',(p,J)=>J._spW2+Math.PI,'rua',['ruas',()=>boneLens().ua]],r_hand:['r_elbow',(p,J)=>J._ruaW,'rfa',['rfas',()=>boneLens().fa]],
 l_knee:['l_hip',()=>90*D,'lth',['lths',()=>boneLens().th]],l_foot:['l_knee',(p,J)=>(90+p.lth)*D,'lsh',['lshs',()=>boneLens().sh]],
 r_knee:['r_hip',()=>90*D,'rth',['rths',()=>boneLens().th]],r_foot:['r_knee',(p,J)=>(90+p.rth)*D,'rsh',['rshs',()=>boneLens().sh]],
 blade_tip:['r_hand',(p,J)=>J._rfaW,'wp'],blade_mid:['r_hand',(p,J)=>J._rfaW,'wp'],muzzle:['r_hand',(p,J)=>J._rfaW,'wp'],weapon_tip:['r_hand',(p,J)=>J._rfaW,'wp'],weapon_mid:['r_hand',(p,J)=>J._rfaW,'wp']};
let dragJ=null,cam={z:1,x:0,y:0,init:false},panning=null;
function camInit(){if(!cam.init&&W){cam.x=W/2;cam.y=H/2;cam.init=true}}
function toWorld(mx,my){return[(mx-W/2)/cam.z+cam.x,(my-H/2)/cam.z+cam.y]}
cv.addEventListener('wheel',e=>{e.preventDefault();camInit();
 const r=cv.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
 const[wx,wy]=toWorld(mx,my);const nz=Math.max(0.3,Math.min(6,cam.z*Math.pow(1.1,-e.deltaY/100)));
 cam.x=wx-(mx-W/2)/nz;cam.y=wy-(my-H/2)/nz;cam.z=nz},{passive:false});
function resetView(){cam.z=1;cam.x=W/2;cam.y=H/2}
cv.onmousedown=e=>{camInit();const r=cv.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
 if(weaponEdit){const[wx,wy]=toWorld(mx,my);wpnClick(wx,wy);return}
 if(poseMode&&selKF>=0){const[wx,wy]=toWorld(mx,my);
  const J=joints(keyframes[selKF].p);let best=null,bd=14/cam.z;
  for(const k in J){if(k[0]==='_')continue;const d=Math.hypot(J[k][0]-wx,J[k][1]-wy);if(d<bd){bd=d;best=k}}
  dragJ=best;if(dragJ)return}
 panning=[mx,my]};
cv.onmousemove=e=>{const r=cv.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
 if(weaponEdit&&dragWP>=0){const[wx,wy]=toWorld(mx,my);CH.weapon.points[dragWP]=wpnLocal(wx,wy);return}
 if(panning){cam.x-=(mx-panning[0])/cam.z;cam.y-=(my-panning[1])/cam.z;panning=[mx,my];return}
 if(!dragJ||selKF<0)return;const[wx,wy]=toWorld(mx,my);
 const kp=keyframes[selKF].p;
 if(dragJ==='hip'){kp.rx=wx-W/2;kp.ry=wy-(H/2+40);return}
 const m=DRAGMAP[dragJ];if(!m)return;const J=joints(kp);const o=J[m[0]];
 const wa=Math.atan2(wy-o[1],wx-o[0]);kp[m[2]]=(wa-m[1](kp,J))/D;
 while(kp[m[2]]>180)kp[m[2]]-=360;while(kp[m[2]]<-180)kp[m[2]]+=360;
 if(m[3]){const dist=Math.hypot(wx-o[0],wy-o[1]);kp[m[3][0]]=Math.max(0.5,Math.min(1.8,+(dist/m[3][1]()).toFixed(3)))}};
cv.onmouseup=()=>{dragJ=null;panning=null;dragWP=-1};cv.onmouseleave=()=>{dragJ=null;panning=null;dragWP=-1};
// ================= FX ENGINE =================
const DEF={
particles:{anchor:'point',follow:false,count:24,spread_deg:360,angle_deg:-90,speed_min:80,speed_max:280,gravity:0,drag:0.94,size_min:2,size_max:5,size_over_life:'shrink',life_min:250,life_max:550,c1:'#ff4040',c2:'#ffd070',glow:10,blend:'additive',shape:'circle',delay_ms:0,burst:true,emit_rate:60},
ring:{anchor:'point',follow:false,radius_start:4,radius_end:90,thickness:6,life_min:350,life_max:350,c1:'#ffffff',c2:'#ff4040',glow:14,blend:'additive',delay_ms:0,thin_out:true},
flash:{anchor:'point',follow:false,size_min:20,size_max:60,life_min:90,life_max:140,c1:'#fff6d0',c2:'#ff8030',glow:20,blend:'additive',delay_ms:0,rays:0},
crescent:{anchor:'point',follow:false,radius_start:20,radius_end:70,arc_deg:120,thickness:9,angle_deg:0,spin_deg:180,life_min:220,life_max:300,c1:'#ff3050',c2:'#ffb0c0',glow:12,blend:'additive',delay_ms:0},

  if(l.aim_weapon&&curJ&&curJ._wW!==undefined)a=curJ._wW;
  const pulse=1+0.3*Math.sin(el/1000*6.28*(l.pulse_hz||0)+p.seed),seg=l.segments,len=l.length;
  ctx.lineWidth=Math.max(1,l.width*pulse*(1-t*0.6));ctx.lineCap='round';ctx.beginPath();
  for(let i=0;i<=seg;i++){const f=i/seg,j=(i===0||i===seg)?0:(l.jitter||0);
   const x=p.x+Math.cos(a)*len*f+rnd(-j,j),y=p.y+Math.sin(a)*len*f+rnd(-j,j);i?ctx.lineTo(x,y):ctx.moveTo(x,y)}ctx.stroke();
  ctx.lineWidth=Math.max(0.5,l.width*0.35);ctx.strokeStyle='#fff';ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x+Math.cos(a)*len,p.y+Math.sin(a)*len);ctx.stroke()}}
 ctx.globalAlpha=1;ctx.shadowBlur=0;ctx.globalCompositeOperation='source-over'}

 if(o.format==='pb_character'){importChar(o);jsonEl.style.display='none';return}
 fx.layers=o.layers||[];

// ================= CHARACTER CREATOR =================
let appMode='fx',CH=null,curStep='setup',weaponEdit=false,dragWP=-1;
const ACT_DEFS=[
 ['idle','Idle','ambient',0],['run','Running','ambient',0],
 ['attack_normal','Normal Attack','on_hit',1],['attack_special','Special Attack','on_hit',1],
 ['ultimate','Ultimate','on_ult',1],['defend','Block / Dodge','on_parry',0],
 ['special_ability','Special Ability','ambient',0],['impact','Impact (got hit)','on_hit',0]];
const SAB_PRESETS=['none','shield','heal','clone','time_slow','rage','teleport','dual_defense'];
const DEF_KF={
 idle:()=>[{t:0,p:P({})},{t:.5,p:P({ry:2,sp:2})},{t:1,p:P({})}],
 run:()=>[{t:0,p:P({lth:-35,lsh:40,rth:30,rsh:8,lua:-30,rua:25,sp:6})},{t:.5,p:P({lth:30,lsh:8,rth:-35,rsh:40,lua:25,rua:-30,sp:6})},{t:1,p:P({lth:-35,lsh:40,rth:30,rsh:8,lua:-30,rua:25,sp:6})}],
 attack_normal:()=>[{t:0,p:P({rua:-150,rfa:-40,wp:-50,sp:-10,rx:-10})},{t:.4,p:P({rua:-155,rfa:-45,wp:-55,sp:-12,rx:-14})},{t:.6,p:P({rua:35,rfa:25,wp:35,sp:14,rx:25,lth:25,rth:-30})},{t:1,p:P({})}],
 attack_special:()=>[{t:0,p:P({rx:-40,rua:-160,rfa:-50,wp:-60,sp:-14})},{t:.45,p:P({rx:30,rua:40,rfa:30,wp:40,sp:16,lth:30,rth:-35})},{t:.7,p:P({rx:45,rua:20,rfa:15,wp:20,sp:8})},{t:1,p:P({})}],
 ultimate:()=>[{t:0,p:P({})},{t:.25,p:P({rua:-170,rfa:-10,wp:-80,lua:-40,sp:-8,ry:-6})},{t:.7,p:P({rua:-170,rfa:-10,wp:-80,lua:-40,sp:-8,ry:-10})},{t:1,p:P({})}],
 defend_block:()=>[{t:0,p:P({})},{t:.2,p:P({rua:-120,rfa:-60,wp:-90,sp:-4,lua:-30})},{t:.8,p:P({rua:-120,rfa:-60,wp:-90,sp:-4,lua:-30})},{t:1,p:P({})}],
 defend_dodge:()=>[{t:0,p:P({})},{t:.35,p:P({rx:-55,sp:18,lth:-28,rth:24,ry:6})},{t:.7,p:P({rx:-70,sp:8})},{t:1,p:P({})}],
 special_ability:()=>[{t:0,p:P({})},{t:.3,p:P({lua:-140,rua:-140,lfa:-20,rfa:-20,sp:-6,ry:-4})},{t:.75,p:P({lua:-150,rua:-150,lfa:-25,rfa:-25,sp:-6,ry:-8})},{t:1,p:P({})}],
 impact:()=>[{t:0,p:P({})},{t:.15,p:P({rx:14,sp:14,hd:12,rua:15,lua:-25,ry:4})},{t:.5,p:P({rx:8,sp:8,hd:6})},{t:1,p:P({})}]};
function newChar(){return{name:'new_fighter',palette:{body:'#8fa0b8',accent:'#ff5050'},defense:'block',
 bones:{ua:22,fa:20,th:26,sh:24,torso:36},
 weapon:{points:[[14,0],[34,0]],thickness:3,color:'#d8dee9'},
 special_ability:{preset:'none',params:{duration_ms:3000,cooldown_ms:8000,magnitude:25},fx_layers:[]},
 actions:{}}}
function ensureAction(ak){if(CH.actions[ak])return;const d=ACT_DEFS.find(a=>a[0]===ak);let kf;
 if(ak==='defend')kf=CH.defense==='block'?DEF_KF.defend_block():DEF_KF.defend_dodge();
 else if(ak==='defend2')kf=CH.defense==='block'?DEF_KF.defend_dodge():DEF_KF.defend_block();
 else kf=(DEF_KF[ak]||DEF_KF.idle)();
 fixKF(kf);
 CH.actions[ak]={trigger:ak==='defend2'?'on_parry':(d?d[2]:'ambient'),duration_ms:ak==='run'||ak==='idle'?900:800,
  keyframes:kf,fx_layers:[],
  battle:(d&&d[3])?{damage:ak==='ultimate'?30:ak==='attack_special'?18:10,deflect:false,explode:false,explode_radius:60,
   scatter:false,scatter_count:5,scatter_spread_deg:60,pierce:false,pierce_targets:2}:null}}
// --- custom weapon math (points are in weapon-local frame, origin=r_hand, +x along weapon angle) ---
function wpnWorld(hand,wW){if(!CH||!CH.weapon.points.length)return[];const c=Math.cos(wW),s=Math.sin(wW);
 return CH.weapon.points.map(p=>[hand[0]+p[0]*c-p[1]*s,hand[1]+p[0]*s+p[1]*c])}
function wpnMid(pts,hand){const chain=[hand,...pts];let tot=0;const segs=[];
 for(let i=0;i<chain.length-1;i++){const d=Math.hypot(chain[i+1][0]-chain[i][0],chain[i+1][1]-chain[i][1]);segs.push(d);tot+=d}
 if(!tot)return[hand[0],hand[1]];let h=tot/2;
 for(let i=0;i<segs.length;i++){if(h<=segs[i]){const f=h/(segs[i]||1);return[lerp(chain[i][0],chain[i+1][0],f),lerp(chain[i][1],chain[i+1][1],f)]}h-=segs[i]}
 return pts[pts.length-1]}
function wpnLocal(wx,wy){const hand=curJ.r_hand,wW=curJ._wW,dx=wx-hand[0],dy=wy-hand[1],c=Math.cos(-wW),s=Math.sin(-wW);
 return[+(dx*c-dy*s).toFixed(1),+(dx*s+dy*c).toFixed(1)]}
function wpnClick(wx,wy){if(!curJ)return;const pts=curJ._wpts||[];
 for(let i=0;i<pts.length;i++){if(Math.hypot(pts[i][0]-wx,pts[i][1]-wy)<9/cam.z){dragWP=i;return}}
 CH.weapon.points.push(wpnLocal(wx,wy));const c=$('wpc');if(c)c.textContent=CH.weapon.points.length}
function wpnUndo(){CH.weapon.points.pop()}
function wpnClear(){CH.weapon.points=[]}
// --- wizard ---
function wizSteps(){const s=[{k:'setup',n:'Character Setup'},{k:'weapon',n:'Weapon Designer'}];
 ACT_DEFS.forEach(a=>s.push({k:'act:'+a[0],n:a[1]}));
 if(CH.special_ability.preset==='dual_defense'){const i=s.findIndex(x=>x.k==='act:special_ability');
  s.splice(i+1,0,{k:'act:defend2',n:'Second Defense ('+(CH.defense==='block'?'Dodge':'Block')+')'})}
 s.push({k:'review',n:'Review & Export'});return s}
function renderWiz(){const d=$('wsteps');d.innerHTML='';wizSteps().forEach((s,i)=>{
 const done=s.k.startsWith('act:')?!!CH.actions[s.k.slice(4)]:(s.k==='setup'||s.k==='weapon');
 const e=document.createElement('div');e.className='wstep'+(s.k===curStep?' cur':'')+(done?' done':'');
 e.textContent=(i+1)+'. '+s.n;e.onclick=()=>gotoStep(s.k);d.appendChild(e)})}
function saveStep(){if(appMode!=='char'||!CH)return;
 if(curStep.startsWith('act:')){const a=CH.actions[curStep.slice(4)];
  if(a){a.duration_ms=+$('dur').value;a.trigger=$('trig').value;a.keyframes=keyframes;a.fx_layers=fx.layers}}}
function loadCharAction(ak){ensureAction(ak);const a=CH.actions[ak];
 keyframes=a.keyframes;fx.layers=a.fx_layers;$('dur').value=a.duration_ms;$('trig').value=a.trigger;
 $('fxname').value=CH.name+'_'+ak;sel=fx.layers.length?0:-1;selKF=-1;
 if(poseMode)togglePose();renderTL();renderLayers();renderProps();play()}
function gotoStep(k){saveStep();curStep=k;weaponEdit=false;
 if(k==='setup'||k==='review'){ensureAction('idle');loadCharAction('idle')}
 else if(k==='weapon'){ensureAction('idle');loadCharAction('idle');stop();weaponEdit=true;
  $('stat').textContent='weapon edit — click canvas to add points'}
 else if(k.startsWith('act:')){loadCharAction(k.slice(4))}
 renderWiz();renderStepUI()}
function chRow(lbl,inner){return `<div class="row"><label>${lbl}</label><div class="v">${inner}</div></div>`}
function battleUI(a){const b=a.battle;if(!b)return'';
 const chk=(k,lbl)=>`<div class="row"><label>${lbl}</label><div class="v"><input type="checkbox" ${b[k]?'checked':''} onchange="bSet('${k}',this.checked)"></div></div>`;
 const sld=(k,lbl,mn,mx,st)=>chRow(lbl,`<input type="range" min="${mn}" max="${mx}" step="${st}" value="${b[k]}" oninput="bSet('${k}',+this.value);this.nextElementSibling.textContent=this.value"><span class="val">${b[k]}</span>`);
 return `<h3 style="padding-left:0">Battle Properties</h3>`+sld('damage','Damage',0,100,1)+
  chk('deflect','Deflect')+chk('explode','Explode')+(b.explode?sld('explode_radius','↳ Radius',20,200,5):'')+
  chk('scatter','Scatter')+(b.scatter?sld('scatter_count','↳ Count',2,12,1)+sld('scatter_spread_deg','↳ Spread°',10,180,5):'')+
  chk('pierce','Pierce')+(b.pierce?sld('pierce_targets','↳ Targets',1,6,1):'')}
function bSet(k,v){const a=CH.actions[curStep.slice(4)];if(!a||!a.battle)return;const re=typeof v==='boolean';a.battle[k]=v;if(re)renderStepUI()}
function chSet(path,v){const seg=path.split('.');let o=CH;while(seg.length>1)o=o[seg.shift()];o[seg[0]]=v}
function sabSet(k,v){if(k==='preset'){CH.special_ability.preset=v;renderWiz();renderStepUI()}else CH.special_ability.params[k]=+v}
function renderStepUI(){const d=$('stepui');if(appMode!=='char'){d.innerHTML='';return}let h='';
 if(curStep==='setup'){h=`<h3 style="padding-left:0">Character Setup</h3>`+
  chRow('Name',`<input type="text" value="${CH.name}" onchange="chSet('name',this.value)">`)+
  chRow('Body color',`<input type="color" value="${CH.palette.body}" oninput="chSet('palette.body',this.value)">`)+
  chRow('Accent color',`<input type="color" value="${CH.palette.accent}" oninput="chSet('palette.accent',this.value)">`)+
  chRow('Torso len',`<input type="range" min="20" max="60" step="1" value="${CH.bones.torso}" oninput="chSet('bones.torso',+this.value);this.nextElementSibling.textContent=this.value"><span class="val">${CH.bones.torso}</span>`)+
  chRow('Upper arm',`<input type="range" min="10" max="40" step="1" value="${CH.bones.ua}" oninput="chSet('bones.ua',+this.value);this.nextElementSibling.textContent=this.value"><span class="val">${CH.bones.ua}</span>`)+
  chRow('Forearm',`<input type="range" min="10" max="40" step="1" value="${CH.bones.fa}" oninput="chSet('bones.fa',+this.value);this.nextElementSibling.textContent=this.value"><span class="val">${CH.bones.fa}</span>`)+
  chRow('Thigh',`<input type="range" min="12" max="45" step="1" value="${CH.bones.th}" oninput="chSet('bones.th',+this.value);this.nextElementSibling.textContent=this.value"><span class="val">${CH.bones.th}</span>`)+
  chRow('Shin',`<input type="range" min="12" max="45" step="1" value="${CH.bones.sh}" oninput="chSet('bones.sh',+this.value);this.nextElementSibling.textContent=this.value"><span class="val">${CH.bones.sh}</span>`)+
  chRow('Defense',`<select onchange="chSet('defense',this.value);renderWiz()"><option value="block" ${CH.defense==='block'?'selected':''}>Block</option><option value="dodge" ${CH.defense==='dodge'?'selected':''}>Dodge</option></select>`)+
  `<small style="color:#7a8599;display:block;padding:4px 0">Pick Block or Dodge. The "dual_defense" special ability preset unlocks both later.</small>`}
 else if(curStep==='weapon'){h=`<h3 style="padding-left:0">Weapon Designer</h3>
  <small style="color:#7a8599;display:block;padding:4px 0">Click on the canvas to add polyline points outward from the hand. Drag points to adjust. Anchors <b>weapon_mid</b> and <b>weapon_tip</b> are auto-generated for FX layers.</small>`+
  chRow('Thickness',`<input type="range" min="1" max="10" step="0.5" value="${CH.weapon.thickness}" oninput="chSet('weapon.thickness',+this.value);this.nextElementSibling.textContent=this.value"><span class="val">${CH.weapon.thickness}</span>`)+
  chRow('Color',`<input type="color" value="${CH.weapon.color}" oninput="chSet('weapon.color',this.value)">`)+

 else if(curStep==='act:special_ability'){const sa=CH.special_ability;
  h=`<h3 style="padding-left:0">Special Ability</h3>`+
  chRow('Preset base',`<select onchange="sabSet('preset',this.value)">${SAB_PRESETS.map(p=>`<option ${p===sa.preset?'selected':''}>${p}</option>`).join('')}</select>`)+
  chRow('Duration ms',`<input type="number" value="${sa.params.duration_ms}" onchange="sabSet('duration_ms',this.value)">`)+
  chRow('Cooldown ms',`<input type="number" value="${sa.params.cooldown_ms}" onchange="sabSet('cooldown_ms',this.value)">`)+
  chRow('Magnitude',`<input type="number" value="${sa.params.magnitude}" onchange="sabSet('magnitude',this.value)">`)+
  `<small style="color:#7a8599;display:block;padding:4px 0">Preset defines the mechanic; add custom FX layers below for its visuals. <b>dual_defense</b> adds a second defense animation step.</small>`}
 else if(curStep.startsWith('act:')){const ak=curStep.slice(4),def=ACT_DEFS.find(a=>a[0]===ak);
  h=`<h3 style="padding-left:0">${def?def[1]:ak==='defend2'?'Second Defense':ak}</h3>

 else if(curStep==='review'){const done=Object.keys(CH.actions).length,need=wizSteps().filter(s=>s.k.startsWith('act:')).length;

 d.innerHTML=h}

 $('fig').value='swordsman';fx.layers=[];sel=-1;loadAction();renderLayers();renderProps()}

 acts[k]={trigger:a.trigger,duration_ms:a.duration_ms,keyframes:a.keyframes,fx_layers:a.fx_layers};
 if(a.battle)acts[k].battle=a.battle}
 return JSON.stringify({format:'pb_character',version:1,name:CH.name,rig:'humanoid_v2',modes:['solo','battle'],
  bones:CH.bones,
  palette:CH.palette,defense:CH.defense,dual_defense:CH.special_ability.preset==='dual_defense',
  weapon:{points:CH.weapon.points,thickness:CH.weapon.thickness,color:CH.weapon.color,anchors:['weapon_mid','weapon_tip']},

function importChar(o){CH=newChar();CH.name=o.name||CH.name;if(o.palette)CH.palette=o.palette;if(o.bones)CH.bones=o.bones;
 if(o.defense)CH.defense=o.defense;if(o.weapon)CH.weapon={points:o.weapon.points||[],thickness:o.weapon.thickness||3,color:o.weapon.color||'#d8dee9'};
 if(o.special_ability)CH.special_ability=o.special_ability;
 CH.actions={};for(const k in (o.actions||{})){const a=o.actions[k];fixKF(a.keyframes||[]);
  CH.actions[k]={trigger:a.trigger||'ambient',duration_ms:a.duration_ms||800,keyframes:a.keyframes||DEF_KF.idle(),fx_layers:a.fx_layers||[],battle:a.battle||null}}
 appMode='char';enterChar()}
