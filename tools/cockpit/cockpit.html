<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PB Dev Cockpit</title>
<style>
:root{
  --bg:#0c0c10; --panel:#13141a; --panel2:#191b23; --line:#262a36;
  --ink:#d6dae4; --dim:#7a8194; --faint:#4a5060;
  --p1:#39d5ff; --p2:#ff5ad0; --amber:#ffc248; --ok:#5dff9d; --bad:#ff6363;
  --mono:"IBM Plex Mono","JetBrains Mono",ui-monospace,Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font:13px/1.45 var(--mono);
  display:flex;flex-direction:column;overflow:hidden}
button,select,input{font:inherit;color:inherit;background:var(--panel2);
  border:1px solid var(--line);border-radius:3px;padding:4px 9px;cursor:pointer}
button:hover{border-color:var(--dim)}
button.on{border-color:var(--amber);color:var(--amber)}
button:focus-visible,select:focus-visible,input:focus-visible{
  outline:2px solid var(--p1);outline-offset:1px}
input[type=text],textarea{cursor:text;width:100%}
textarea{background:var(--bg);border:1px solid var(--line);border-radius:3px;
  padding:6px;color:var(--ink);resize:vertical}

/* header */
#hdr{display:flex;align-items:center;gap:10px;padding:8px 12px;
  background:var(--panel);border-bottom:1px solid var(--line);flex-wrap:wrap}
#hdr .brand{letter-spacing:.18em;font-weight:600;color:var(--dim)}
#hdr .brand b{color:var(--ink)}
#runmeta{color:var(--dim)}
#runmeta em{font-style:normal;color:var(--ink)}
#runmeta .s0{color:var(--p1)} #runmeta .s1{color:var(--p2)}
#hdr .grow{flex:1}
#status{color:var(--faint)}
#status.err{color:var(--bad)}

/* main */
#main{flex:1;display:flex;min-height:0}
#stage{flex:1;display:flex;align-items:center;justify-content:center;
  position:relative;min-width:0;background:
  radial-gradient(1200px 600px at 50% 40%,#111219 0%,var(--bg) 70%)}
#stack{position:relative;max-width:100%;max-height:100%}
#stack canvas{display:block;max-width:100%;max-height:calc(100vh - 190px);
  border:1px solid var(--line)}
#ov{position:absolute;inset:0;width:100%;height:100%}
#stage .hint{position:absolute;bottom:8px;left:12px;color:var(--faint)}

/* side panel */
#side{width:340px;background:var(--panel);border-left:1px solid var(--line);
  display:flex;flex-direction:column;min-height:0}
#tabs{display:flex;border-bottom:1px solid var(--line)}
#tabs button{flex:1;border:0;border-radius:0;background:none;
  padding:8px 0;color:var(--dim);border-bottom:2px solid transparent}
#tabs button.on{color:var(--ink);border-bottom-color:var(--amber)}
.pane{flex:1;overflow:auto;padding:10px;display:none;min-height:0}
.pane.on{display:block}
.kv{display:grid;grid-template-columns:auto 1fr;gap:2px 10px;margin-bottom:8px}
.kv b{color:var(--dim);font-weight:400}
.ent{border:1px solid var(--line);border-radius:3px;padding:6px 8px;
  margin-bottom:6px;cursor:pointer}
.ent:hover{border-color:var(--dim)}
.ent.sel{border-color:var(--amber)}
.ent .tag{float:right;color:var(--faint)}
.ent .s0{color:var(--p1)} .ent .s1{color:var(--p2)}
.hpbar{height:4px;background:var(--panel2);border-radius:2px;margin-top:4px}
.hpbar i{display:block;height:100%;border-radius:2px;background:var(--ok)}
.evt{padding:3px 0;border-bottom:1px dashed var(--line);color:var(--dim)}
.evt b{color:var(--amber);font-weight:400;margin-right:6px}
.ann{border:1px solid var(--line);border-radius:3px;padding:7px 8px;margin-bottom:8px}
.ann.sel{border-color:var(--amber)}
.ann .row{display:flex;gap:6px;align-items:center;margin-bottom:5px;color:var(--dim)}
.ann .row .grow{flex:1}
.ann .link{color:var(--p1)}
.ann textarea{min-height:44px;font-size:12px}
.small{color:var(--faint);font-size:11px}
h4{color:var(--dim);font-weight:400;letter-spacing:.1em;margin:10px 0 6px}
.pane section{margin-bottom:14px}
.rowline{display:flex;gap:6px;align-items:center;margin:6px 0;flex-wrap:wrap}
.rowline label{color:var(--dim)}
input[type=range]{padding:0}

/* transport + oscilloscope */
#deck{background:var(--panel);border-top:1px solid var(--line);padding:8px 12px}
#transport{display:flex;gap:8px;align-items:center;margin-bottom:6px;flex-wrap:wrap}
#tickread{min-width:130px;color:var(--amber)}
#tools{display:flex;gap:4px;margin-left:auto}
#scope{width:100%;height:56px;display:block;cursor:crosshair;
  border:1px solid var(--line);border-radius:3px;background:var(--bg)}

/* modal-ish export */
#exportBox{display:none;position:absolute;right:352px;bottom:120px;width:420px;
  max-width:60vw;background:var(--panel);border:1px solid var(--amber);
  border-radius:4px;padding:10px;z-index:5}
#exportBox.on{display:block}
#exportBox textarea{min-height:140px;font-size:11px}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>

<div id="hdr">
  <span class="brand">PROJECT BEHAVIOR ▸ <b>DEV COCKPIT</b></span>
  <span id="runmeta">no run loaded</span>
  <span class="grow"></span>
  <span id="status">idle</span>
  <button id="btnReload" title="Re-fetch the bundle from GitHub">Reload run</button>
  <input type="file" id="fileIn" accept=".json,.pbrun.json" style="display:none">
  <button id="btnFile" title="Load a bundle file from disk">Open file…</button>
</div>

<div id="main">
  <div id="stage">
    <div id="stack">
      <canvas id="cv"></canvas>
      <canvas id="ov"></canvas>
    </div>
    <div class="hint">space play/pause · ←/→ step · shift+←/→ ×10 · click entities with Select</div>
  </div>

  <div id="side">
    <div id="tabs">
      <button data-pane="pState" class="on">State</button>
      <button data-pane="pEvents">Events</button>
      <button data-pane="pAnns">Annotate</button>
    </div>

    <div class="pane on" id="pState">
      <div class="kv" id="worldKv"></div>
      <h4>FIGURES</h4><div id="figList"></div>
      <h4>PROJECTILES <span class="small" id="projCount"></span></h4>
      <div id="projList"></div>
    </div>

    <div class="pane" id="pEvents">
      <div class="rowline"><label><input type="checkbox" id="evAll"> whole run</label></div>
      <div id="evtList"></div>
    </div>

    <div class="pane" id="pAnns">
      <section>
        <h4>REFERENCE IMAGE</h4>
        <input type="file" id="refIn" accept="image/*">
        <div class="rowline"><label>opacity</label>
          <input type="range" id="refOp" min="5" max="100" value="45">
          <label>scale</label>
          <input type="range" id="refSc" min="5" max="300" value="100">
          <button id="refClear">Remove</button></div>
        <div class="small">Drag the image on the frame to position it.</div>
      </section>
      <section>
        <h4>ANNOTATIONS — TICK <span id="annTick">–</span></h4>
        <div id="annList"></div>
        <div class="rowline">
          <button id="btnExport">Build request package</button>
          <button id="btnClearTick">Clear tick</button>
        </div>
      </section>
    </div>
  </div>
</div>

<div id="deck">
  <div id="transport">
    <button id="btnPlay">▶ Play</button>
    <button id="btnBack" title="Step back">⟨</button>
    <button id="btnFwd" title="Step forward">⟩</button>
    <select id="speed">
      <option value="0.25">0.25×</option><option value="0.5">0.5×</option>
      <option value="1" selected>1×</option><option value="2">2×</option>
    </select>
    <span id="tickread">tick – / –</span>
    <label><input type="checkbox" id="showEnt" checked> entity markers</label>
    <div id="tools">
      <button data-tool="select" class="on">Select</button>
      <button data-tool="arrow">Arrow</button>
      <button data-tool="circle">Circle</button>
      <button data-tool="pen">Pen</button>
      <button data-tool="text">Text</button>
    </div>
  </div>
  <canvas id="scope"></canvas>
</div>

<div id="exportBox">
  <h4>REQUEST PACKAGE — paste this to Claude</h4>
  <textarea id="exportTxt" readonly></textarea>
  <div class="rowline">
    <button id="btnCopy">Copy JSON</button>
    <button id="btnPng">Download annotated frame</button>
    <button id="btnCloseExp">Close</button>
  </div>
</div>

<script>
"use strict";
/* ======================================================================
   PB Dev Cockpit — plays cockpit_run v1 bundles produced by
   tools/cockpit/capture.py.  Architecture notes for future extension:
   - TOOLS registry: add an annotation tool = add one object here.
   - Annotations are stored in WORLD coordinates (engine pixels), so they
     stay pinned to simulation space regardless of frame scale.
   - Rendering is layered: frame image -> reference image -> entity
     markers -> annotations -> live tool preview, all on the overlay.
   ====================================================================== */

const DEFAULT_URL =
  "https://raw.githubusercontent.com/workingdanielferreira-create/"
  + "Project_Behavior/main/captures/latest.pbrun.json";

const S = {                    // application state
  bundle:null, tick:0, playing:false, speed:1, timer:null,
  tool:"select", drawing:null, sel:null,      // sel = {type,key}
  anns:[],                                     // all annotations, all ticks
  annSel:null, nextAnn:1,
  ref:{img:null, x:200, y:200, op:.45, sc:1, drag:null},
  imgCache:new Map(), showEnt:true,
};
const $ = id => document.getElementById(id);
const cv = $("cv"), ov = $("ov"), scope = $("scope");
const ctx = cv.getContext("2d"), octx = ov.getContext("2d");

/* ---------------- bundle loading ---------------- */
async function loadURL(url){
  setStatus("fetching bundle…");
  try{
    const r = await fetch(url + "?t=" + Date.now());
    if(!r.ok) throw new Error("HTTP " + r.status);
    ingest(await r.json());
  }catch(e){ setStatus("load failed: " + e.message, true); }
}
function ingest(b){
  if(!b.meta || b.meta.version !== "cockpit_run v1"){
    setStatus("not a cockpit_run v1 bundle", true); return;
  }
  S.bundle = b; S.tick = 0; S.imgCache.clear(); S.sel = null;
  cv.width = ov.width = b.meta.frame_w; cv.height = ov.height = b.meta.frame_h;
  const m = b.meta;
  $("runmeta").innerHTML =
    `<em class="s0">${m.p1}</em> vs <em class="s1">${m.p2 ?? "—"}</em>` +
    ` · seed <em>${m.seed}</em> · ${m.ticks} ticks` +
    ` · <em>${(m.engine_commit||"").slice(0,7)}</em> · ${m.captured_at||""}`;
  buildScope(); show(0);
  setStatus("run loaded");
}
function setStatus(t, err){ const s=$("status");
  s.textContent=t; s.className = err ? "err" : ""; }

/* ---------------- frame + coordinate helpers ---------------- */
const W2F = () => S.bundle.meta.frame_w / S.bundle.meta.world_w; // world->frame
function frameEntry(t){
  const fr = S.bundle.frames;
  for(let i=t;i>=0;i--) if(fr[i].png) return fr[i];   // frame_every>1 support
  return fr[0];
}
function frameImage(t, cb){
  const e = frameEntry(t);
  if(S.imgCache.has(e.t)) return cb(S.imgCache.get(e.t));
  const im = new Image();
  im.onload = ()=>{ S.imgCache.set(e.t, im);
    if(S.imgCache.size>140) S.imgCache.delete(S.imgCache.keys().next().value);
    cb(im); };
  im.src = "data:image/jpeg;base64," + e.png;
}
function evPos(e){                 // pointer event -> frame px + world px
  const r = ov.getBoundingClientRect();
  const fx = (e.clientX-r.left) * ov.width  / r.width;
  const fy = (e.clientY-r.top ) * ov.height / r.height;
  return {fx, fy, wx: fx/W2F(), wy: fy/W2F()};
}

/* ---------------- rendering ---------------- */
function show(t){
  if(!S.bundle) return;
  S.tick = Math.max(0, Math.min(t, S.bundle.frames.length-1));
  frameImage(S.tick, im=>{
    ctx.drawImage(im,0,0,cv.width,cv.height);
    drawOverlay(); renderPanels(); drawScopeCursor();
  });
  $("tickread").textContent =
    `tick ${S.tick} / ${S.bundle.frames.length-1}`;
  $("annTick").textContent = S.tick;
}
function drawOverlay(preview){
  octx.clearRect(0,0,ov.width,ov.height);
  const k = W2F();
  if(S.ref.img){                                   // reference image layer
    octx.save(); octx.globalAlpha = S.ref.op;
    const w = S.ref.img.width*S.ref.sc*k, h = S.ref.img.height*S.ref.sc*k;
    octx.drawImage(S.ref.img, S.ref.x*k - w/2, S.ref.y*k - h/2, w, h);
    octx.restore();
  }
  if(S.showEnt) drawEntities(k);
  for(const a of S.anns) if(a.tick===S.tick) drawAnn(a,k,a===S.annSel);
  if(preview) drawAnn(preview,k,true);
}
function drawEntities(k){
  const st = S.bundle.frames[S.tick].state; if(!st) return;
  const css = getComputedStyle(document.documentElement);
  const col = s => css.getPropertyValue(s? "--p2":"--p1");
  for(const f of st.figures){
    octx.strokeStyle = col(f.side); octx.lineWidth = 1;
    octx.setLineDash([3,3]);
    octx.strokeRect(f.x*k-14, f.y*k-30, 28, 60);
    octx.setLineDash([]);
    if(S.sel && S.sel.type==="fig" && S.sel.key===f.side+":"+f.idx){
      octx.strokeStyle = css.getPropertyValue("--amber");
      octx.lineWidth = 2; octx.strokeRect(f.x*k-16, f.y*k-32, 32, 64);
    }
  }
  for(const p of st.projectiles){
    octx.strokeStyle = col(p.side); octx.lineWidth = 1;
    octx.beginPath(); octx.arc(p.x*k, p.y*k, 5, 0, 7); octx.stroke();
    if(S.sel && S.sel.type==="proj" && S.sel.key===p.id){
      octx.strokeStyle = css.getPropertyValue("--amber"); octx.lineWidth = 2;
      octx.beginPath(); octx.arc(p.x*k, p.y*k, 8, 0, 7); octx.stroke();
    }
  }
}
function drawAnn(a,k,hot){
  octx.strokeStyle = octx.fillStyle = hot ? "#ffd97a" : "#ffc248";
  octx.lineWidth = 2; octx.lineJoin = octx.lineCap = "round";
  const P = a.pts.map(p=>[p[0]*k, p[1]*k]);
  if(a.tool==="arrow" && P.length===2){
    const [[x1,y1],[x2,y2]] = P, ang = Math.atan2(y2-y1, x2-x1);
    octx.beginPath(); octx.moveTo(x1,y1); octx.lineTo(x2,y2);
    octx.lineTo(x2-11*Math.cos(ang-.42), y2-11*Math.sin(ang-.42));
    octx.moveTo(x2,y2);
    octx.lineTo(x2-11*Math.cos(ang+.42), y2-11*Math.sin(ang+.42));
    octx.stroke();
  }else if(a.tool==="circle" && P.length===2){
    const [[x1,y1],[x2,y2]] = P;
    octx.beginPath();
    octx.ellipse((x1+x2)/2,(y1+y2)/2,Math.abs(x2-x1)/2||2,
                 Math.abs(y2-y1)/2||2,0,0,7);
    octx.stroke();
  }else if(a.tool==="pen" && P.length>1){
    octx.beginPath(); octx.moveTo(P[0][0],P[0][1]);
    for(const [x,y] of P) octx.lineTo(x,y); octx.stroke();
  }else if(a.tool==="text" && P.length){
    octx.font = "12px "+getComputedStyle(document.body).fontFamily;
    octx.fillText("✎ " + (a.text||("#"+a.id)), P[0][0]+8, P[0][1]-8);
    octx.beginPath(); octx.arc(P[0][0],P[0][1],3,0,7); octx.fill();
  }
  if(a.entity){ octx.font="11px monospace";
    octx.fillText("→"+a.entity.type+" "+a.entity.label,
                  P[0][0]+8, P[0][1]+14); }
}

/* ---------------- oscilloscope timeline ---------------- */
let scopeData = null;
function buildScope(){
  const fr = S.bundle.frames;
  scopeData = fr.map(f=>({
    p: f.state ? f.state.projectiles.length : 0,
    hp: f.state ? f.state.figures.map(g=>g.hp/g.max_hp||0) : [],
    ev: !!f.events,
  }));
  drawScopeCursor();
}
function drawScopeCursor(){
  if(!scopeData) return;
  const c = scope.getContext("2d");
  scope.width = scope.clientWidth * devicePixelRatio;
  scope.height = 56 * devicePixelRatio;
  c.scale(devicePixelRatio, devicePixelRatio);
  const W = scope.clientWidth, H = 56, n = scopeData.length;
  const maxP = Math.max(1, ...scopeData.map(d=>d.p));
  c.clearRect(0,0,W,H);
  c.strokeStyle = "#2a2f3d";                       // projectile density
  c.beginPath();
  scopeData.forEach((d,i)=>{ const x=i/n*W, y=H-4-(d.p/maxP)*(H-18);
    i? c.lineTo(x,y): c.moveTo(x,y); });
  c.stroke();
  ["#39d5ff","#ff5ad0"].forEach((col,si)=>{        // hp traces
    c.strokeStyle = col; c.globalAlpha=.9; c.beginPath(); let started=false;
    scopeData.forEach((d,i)=>{ const v=d.hp[si]; if(v==null) return;
      const x=i/n*W, y=6+(1-v)*(H-24);
      started? c.lineTo(x,y):(c.moveTo(x,y),started=true); });
    c.stroke(); c.globalAlpha=1;
  });
  c.fillStyle="#ffc248";                           // event ticks + annotations
  scopeData.forEach((d,i)=>{ if(d.ev) c.fillRect(i/n*W, H-3, 1, 3); });
  for(const a of S.anns) c.fillRect(a.tick/n*W-1, 0, 2, 4);
  c.fillStyle="#ffc248"; c.globalAlpha=.9;         // playhead
  c.fillRect(S.tick/n*W, 0, 1.5, H); c.globalAlpha=1;
}
scope.addEventListener("pointerdown", e=>{ scrubbing=true; scrub(e); });
let scrubbing=false;
addEventListener("pointermove", e=>{ if(scrubbing) scrub(e); });
addEventListener("pointerup", ()=> scrubbing=false);
function scrub(e){ if(!S.bundle) return;
  const r = scope.getBoundingClientRect();
  show(Math.round((e.clientX-r.left)/r.width * (S.bundle.frames.length-1)));
}

/* ---------------- transport ---------------- */
function play(on){
  S.playing = on ?? !S.playing;
  $("btnPlay").textContent = S.playing ? "❚❚ Pause" : "▶ Play";
  clearInterval(S.timer);
  if(S.playing){
    const ms = (S.bundle?.meta.tick_ms||16) / S.speed;
    S.timer = setInterval(()=>{
      if(S.tick >= S.bundle.frames.length-1) return play(false);
      show(S.tick+1);
    }, ms);
  }
}
$("btnPlay").onclick = ()=>play();
$("btnBack").onclick = ()=>{ play(false); show(S.tick-1); };
$("btnFwd").onclick  = ()=>{ play(false); show(S.tick+1); };
$("speed").onchange  = e=>{ S.speed=+e.target.value; if(S.playing) play(true); };
$("showEnt").onchange= e=>{ S.showEnt=e.target.checked; drawOverlay(); };
addEventListener("keydown", e=>{
  if(e.target.tagName==="TEXTAREA"||e.target.tagName==="INPUT") return;
  if(e.code==="Space"){ e.preventDefault(); play(); }
  if(e.key==="ArrowLeft"){ play(false); show(S.tick-(e.shiftKey?10:1)); }
  if(e.key==="ArrowRight"){ play(false); show(S.tick+(e.shiftKey?10:1)); }
});

/* ---------------- TOOLS registry (extension point) ---------------- */
const TOOLS = {
  select:{ down(p){
    const st=S.bundle.frames[S.tick].state; if(!st) return;
    let best=null, bd=45;
    for(const f of st.figures){ const d=Math.hypot(f.x-p.wx,f.y-p.wy);
      if(d<bd){bd=d;best={type:"fig",key:f.side+":"+f.idx,
        label:f.mode+"["+f.side+"]",data:f};} }
    for(const pr of st.projectiles){ const d=Math.hypot(pr.x-p.wx,pr.y-p.wy);
      if(d<bd){bd=d;best={type:"proj",key:pr.id,
        label:pr.cls+"#"+pr.id,data:pr};} }
    S.sel = best; drawOverlay(); renderPanels();
  }},
  arrow:{ down(p){ S.drawing={tool:"arrow",pts:[[p.wx,p.wy],[p.wx,p.wy]]}; },
    move(p){ S.drawing.pts[1]=[p.wx,p.wy]; },
    up(){ commitAnn(S.drawing); } },
  circle:{ down(p){ S.drawing={tool:"circle",pts:[[p.wx,p.wy],[p.wx,p.wy]]}; },
    move(p){ S.drawing.pts[1]=[p.wx,p.wy]; },
    up(){ commitAnn(S.drawing); } },
  pen:{ down(p){ S.drawing={tool:"pen",pts:[[p.wx,p.wy]]}; },
    move(p){ S.drawing.pts.push([p.wx,p.wy]); },
    up(){ commitAnn(S.drawing); } },
  text:{ down(p){ commitAnn({tool:"text",pts:[[p.wx,p.wy]]}); } },
};
document.querySelectorAll("#tools button").forEach(b=>{
  b.onclick = ()=>{ S.tool=b.dataset.tool;
    document.querySelectorAll("#tools button")
      .forEach(x=>x.classList.toggle("on", x===b)); };
});
ov.addEventListener("pointerdown", e=>{
  if(!S.bundle) return; play(false);
  const p = evPos(e);
  if(S.ref.img && e.altKey){ S.ref.drag={dx:S.ref.x-p.wx, dy:S.ref.y-p.wy}; return; }
  const t = TOOLS[S.tool]; t.down && t.down(p);
  if(S.drawing) drawOverlay(S.drawing);
});
ov.addEventListener("pointermove", e=>{
  const p = evPos(e);
  if(S.ref.drag){ S.ref.x=p.wx+S.ref.drag.dx; S.ref.y=p.wy+S.ref.drag.dy;
    drawOverlay(); return; }
  if(!S.drawing) return;
  TOOLS[S.tool].move && TOOLS[S.tool].move(p);
  drawOverlay(S.drawing);
});
addEventListener("pointerup", ()=>{
  if(S.ref.drag){ S.ref.drag=null; return; }
  if(!S.drawing) return;
  TOOLS[S.tool].up && TOOLS[S.tool].up();
  S.drawing = null;
});
function commitAnn(d){
  const a = {id:S.nextAnn++, tick:S.tick, tool:d.tool,
    pts:d.pts.map(p=>[+p[0].toFixed(1),+p[1].toFixed(1)]),
    text:"", request:"", entity: S.sel ?
      {type:S.sel.type, key:S.sel.key, label:S.sel.label} : null};
  S.anns.push(a); S.annSel = a;
  drawOverlay(); renderAnns(); drawScopeCursor();
  document.querySelector('#tabs button[data-pane="pAnns"]').click();
}

/* ---------------- panels ---------------- */
document.querySelectorAll("#tabs button").forEach(b=>{
  b.onclick = ()=>{
    document.querySelectorAll("#tabs button").forEach(x=>
      x.classList.toggle("on", x===b));
    document.querySelectorAll(".pane").forEach(p=>
      p.classList.toggle("on", p.id===b.dataset.pane));
  };
});
function renderPanels(){
  const st = S.bundle.frames[S.tick].state; if(!st) return;
  $("worldKv").innerHTML =
    `<b>battle</b><span>${st.battle}</span>`+
    `<b>hitstop</b><span>${st.hitstop}</span>`;
  $("figList").innerHTML = st.figures.map(f=>{
    const sel = S.sel&&S.sel.type==="fig"&&S.sel.key===f.side+":"+f.idx;
    return `<div class="ent ${sel?"sel":""}" data-e="fig:${f.side}:${f.idx}">
      <span class="s${f.side}">${f.mode}</span>
      <span class="tag">side ${f.side}</span><br>
      <span class="small">(${f.x}, ${f.y}) hp ${f.hp}/${f.max_hp}
      ${f.flags.length? "· "+f.flags.join(","):""}</span>
      <div class="hpbar"><i style="width:${100*f.hp/(f.max_hp||1)}%"></i></div>
    </div>`; }).join("");
  const ps = st.projectiles;
  $("projCount").textContent = "("+ps.length+")";
  $("projList").innerHTML = ps.slice(0,40).map(p=>{
    const sel = S.sel&&S.sel.type==="proj"&&S.sel.key===p.id;
    return `<div class="ent ${sel?"sel":""}" data-e="proj:${p.id}">
      <span class="s${p.side}">${p.cls}#${p.id}</span>
      <span class="tag">${p.pierce?"PIERCE ":""}${p.hit?"":"cosmetic"}</span><br>
      <span class="small">(${p.x}, ${p.y}) v(${p.vx}, ${p.vy}) dmg ${p.dmg}</span>
    </div>`; }).join("") + (ps.length>40 ?
      `<div class="small">…${ps.length-40} more</div>` : "");
  document.querySelectorAll("#figList .ent,#projList .ent").forEach(el=>{
    el.onclick = ()=>{ const [t,...k]=el.dataset.e.split(":");
      const st2 = S.bundle.frames[S.tick].state;
      if(t==="fig"){ const f=st2.figures.find(f=>f.side==k[0]&&f.idx==k[1]);
        S.sel={type:"fig",key:k.join(":"),label:f.mode+"["+f.side+"]",data:f}; }
      else{ const p=st2.projectiles.find(p=>p.id==k[0]);
        S.sel={type:"proj",key:p.id,label:p.cls+"#"+p.id,data:p}; }
      drawOverlay(); renderPanels(); };
  });
  renderEvents(); renderAnns();
}
function renderEvents(){
  const all = $("evAll").checked, out=[];
  const src = all ? S.bundle.frames :
    S.bundle.frames.slice(Math.max(0,S.tick-30), S.tick+1);
  for(const f of src) if(f.events)
    for(const e of f.events) out.push(`<div class="evt"><b>t${f.t}</b>${
      e.replace(/</g,"&lt;")}</div>`);
  $("evtList").innerHTML = out.length? out.join("") :
    `<div class="small">no engine events ${all?"in run":"near this tick"}</div>`;
}
$("evAll").onchange = renderEvents;
function renderAnns(){
  const here = S.anns.filter(a=>a.tick===S.tick);
  $("annList").innerHTML = here.length ? "" :
    `<div class="small">Draw on the frame to annotate this tick.</div>`;
  for(const a of here){
    const d = document.createElement("div");
    d.className = "ann"+(a===S.annSel?" sel":"");
    d.innerHTML = `<div class="row"><span>#${a.id} ${a.tool}</span>
        ${a.entity? `<span class="link">→ ${a.entity.label}</span>`:""}
        <span class="grow"></span><button data-x="del">✕</button></div>
      <input type="text" data-x="label" placeholder="label (shown on frame)"
        value="${a.text.replace(/"/g,"&quot;")}">
      <textarea data-x="req"
        placeholder="Your request for this annotation…">${a.request}</textarea>`;
    d.querySelector('[data-x=del]').onclick = ()=>{
      S.anns = S.anns.filter(x=>x!==a);
      if(S.annSel===a) S.annSel=null;
      drawOverlay(); renderAnns(); drawScopeCursor(); };
    d.querySelector('[data-x=label]').oninput = e=>{
      a.text=e.target.value; drawOverlay(); };
    d.querySelector('[data-x=req]').oninput = e=> a.request=e.target.value;
    d.onclick = ()=>{ S.annSel=a; drawOverlay(); };
    $("annList").appendChild(d);
  }
}
$("btnClearTick").onclick = ()=>{
  S.anns = S.anns.filter(a=>a.tick!==S.tick);
  drawOverlay(); renderAnns(); drawScopeCursor();
};

/* ---------------- reference image ---------------- */
$("refIn").onchange = e=>{
  const f = e.target.files[0]; if(!f) return;
  const im = new Image();
  im.onload = ()=>{ S.ref.img=im;
    S.ref.x = S.bundle.meta.world_w/2; S.ref.y = S.bundle.meta.world_h/2;
    drawOverlay(); };
  im.src = URL.createObjectURL(f);
};
$("refOp").oninput = e=>{ S.ref.op=e.target.value/100; drawOverlay(); };
$("refSc").oninput = e=>{ S.ref.sc=e.target.value/100; drawOverlay(); };
$("refClear").onclick = ()=>{ S.ref.img=null; drawOverlay(); };

/* ---------------- export package ---------------- */
$("btnExport").onclick = ()=>{
  if(!S.bundle) return;
  const m = S.bundle.meta;
  const pkg = {
    cockpit_request:"v1",
    run:{seed:m.seed, mode:m.mode, p1:m.p1, p2:m.p2,
         engine_commit:m.engine_commit, captured_at:m.captured_at},
    tick:S.tick,
    state_digest:S.bundle.frames[S.tick].state,
    annotations:S.anns.filter(a=>a.tick===S.tick).map(a=>({
      id:a.id, tool:a.tool, world_pts:a.pts, label:a.text,
      linked_entity:a.entity, request:a.request})),
  };
  $("exportTxt").value = JSON.stringify(pkg, null, 1);
  $("exportBox").classList.add("on");
};
$("btnCloseExp").onclick = ()=> $("exportBox").classList.remove("on");
$("btnCopy").onclick = ()=>{ $("exportTxt").select();
  document.execCommand("copy"); setStatus("package copied"); };
$("btnPng").onclick = ()=>{
  const out = document.createElement("canvas");
  out.width=cv.width; out.height=cv.height;
  const c = out.getContext("2d");
  c.drawImage(cv,0,0); c.drawImage(ov,0,0);
  const a = document.createElement("a");
  a.download = `cockpit_t${S.tick}.png`;
  a.href = out.toDataURL("image/png"); a.click();
};

/* ---------------- wiring ---------------- */
$("btnReload").onclick = ()=> loadURL(DEFAULT_URL);
$("btnFile").onclick = ()=> $("fileIn").click();
$("fileIn").onchange = e=>{
  const f = e.target.files[0]; if(!f) return;
  setStatus("reading file…");
  f.text().then(t=> ingest(JSON.parse(t)))
   .catch(err=> setStatus("bad file: "+err.message, true));
};
addEventListener("resize", drawScopeCursor);
loadURL(DEFAULT_URL);
</script>
</body>
</html>
